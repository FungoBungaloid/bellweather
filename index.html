<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bellwether — Demand Forecast</title>
    <meta name="description" content="A weather map, but the fronts are demand. Bellwether projects where demand departs from normal and reallocates media before the weather arrives." />
    <style>
      :root {
        --accent: #ff6a3d;
        --ink: #eaf0f7;
        --muted: #8fa0b5;
        --bg0: #060b12;
        --bg1: #0c1622;
        --panel: rgba(18, 28, 42, 0.72);
        --panel-solid: #101c2b;
        --line: rgba(255, 255, 255, 0.10);
        --warm: #ff6a3d;
        --cool: #34a0e0;
        --pos: #2fd07a;
        --neg: #ff5a6a;
        --cond: "Bahnschrift", "DIN Alternate", "Segoe UI Semibold", "Arial Narrow", system-ui, sans-serif;
        --font: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; }
      body {
        font-family: var(--font);
        color: var(--ink);
        background: radial-gradient(130% 120% at 50% -10%, #12243a 0%, var(--bg1) 45%, var(--bg0) 100%);
        height: 100vh;
      }

      #app { display: grid; grid-template-rows: auto 1fr auto auto; height: 100vh; }

      /* ---------- top bar (network bug + tabs + clock) ---------- */
      #topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 18px; gap: 16px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(0,0,0,.35), transparent);
      }
      .netbug { display: flex; align-items: center; gap: 12px; }
      .netbug .mark {
        font-family: var(--cond); font-weight: 800; font-size: 26px; letter-spacing: .5px;
        background: linear-gradient(90deg, #fff, #c6d6ea);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .netbug .mark .dot { color: var(--accent); -webkit-text-fill-color: var(--accent); }
      .netbug .strap {
        font-family: var(--cond); letter-spacing: 3px; font-size: 11px; color: var(--muted);
        border-left: 1px solid var(--line); padding-left: 12px; text-transform: uppercase;
      }
      #tabs { display: flex; gap: 8px; }
      #tabs button {
        font-family: var(--cond); font-weight: 700; font-size: 14px; letter-spacing: .4px;
        border: 1.5px solid var(--line); background: rgba(255,255,255,.04); color: var(--muted);
        padding: 8px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px;
        text-transform: uppercase; transition: all .15s;
      }
      #tabs button.active {
        color: #fff; border-color: var(--accent);
        background: color-mix(in oklch, var(--accent) 26%, transparent);
        box-shadow: 0 0 18px color-mix(in oklch, var(--accent) 40%, transparent);
      }
      .topright { display: flex; align-items: center; gap: 14px; }
      #clock { font-family: var(--cond); font-size: 15px; letter-spacing: 1px; color: #cfe0f2; min-width: 86px; text-align: right; font-variant-numeric: tabular-nums; }
      .badge {
        font-family: var(--cond); font-size: 11px; font-weight: 700; letter-spacing: .6px;
        padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); white-space: nowrap;
      }
      .badge.live { color: #5ef0a0; box-shadow: 0 0 12px rgba(94,240,160,.25) inset; }
      .badge.snapshot { color: #ffcf6a; }
      .iconbtn {
        font-size: 14px; border: 1.5px solid var(--line); background: rgba(255,255,255,.04);
        color: var(--muted); width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
      }
      .iconbtn:hover { color: #fff; }
      .cb { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; color: var(--muted); }

      /* ---------- stage (map + right rail) ---------- */
      #stagewrap { display: flex; min-height: 0; }
      #stage { position: relative; flex: 1; min-width: 0; }
      #map { position: absolute; inset: 0; width: 100%; height: 100%; }

      .maptitle {
        position: absolute; top: 18px; left: 22px; max-width: 60%;
        font-family: var(--cond); font-weight: 700; font-size: clamp(18px, 2.2vw, 30px);
        line-height: 1.05; text-shadow: 0 2px 16px rgba(0,0,0,.6); pointer-events: none;
        text-transform: uppercase; letter-spacing: .3px;
      }
      .maptitle b { color: var(--accent); }
      .maptitle .sub {
        display: block; font-family: var(--font); font-weight: 500; text-transform: none;
        font-size: 13px; color: #bcccde; margin-top: 6px; letter-spacing: 0;
      }

      /* headline lower-third alert */
      #alert {
        position: absolute; left: 22px; bottom: 20px; right: 22px; max-width: 640px;
        display: flex; align-items: center; gap: 14px; cursor: pointer;
        background: var(--panel); backdrop-filter: blur(8px);
        border: 1px solid var(--line); border-left: 5px solid var(--accent);
        border-radius: 12px; padding: 12px 18px;
        box-shadow: 0 10px 36px rgba(0,0,0,.4); transition: transform .12s;
      }
      #alert:hover { transform: translateY(-2px); }
      #alert .ico { font-size: 22px; filter: drop-shadow(0 0 8px rgba(255,106,61,.6)); }
      #alert .atext { flex: 1; font-size: 14px; line-height: 1.35; color: #eaf0f7; }
      #alert .atext b { font-family: var(--cond); font-size: 16px; letter-spacing: .3px; }
      #alert .cta { font-family: var(--cond); font-weight: 700; color: var(--accent); white-space: nowrap; }

      /* color legend, bottom-right of map */
      .legend {
        position: absolute; right: 18px; bottom: 22px; display: flex; align-items: center; gap: 8px;
        font-family: var(--cond); font-size: 11px; color: #cfe0f2; letter-spacing: .5px;
        background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px;
        pointer-events: none;
      }
      .legend .grad { width: 120px; height: 8px; border-radius: 4px;
        background: linear-gradient(90deg, #1f5fa6, #5b9bd5, #f6f4e8, #e4572e, #a01f1f); }

      /* ---------- right rail ---------- */
      #rail {
        width: 340px; flex: none; border-left: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(10,18,28,.5), rgba(8,14,22,.85));
        display: flex; flex-direction: column; padding: 16px 16px 10px;
      }
      .railhead { font-family: var(--cond); font-size: 12px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
      .railhead b { color: var(--accent); }
      #railcard {
        flex: 1; margin-top: 12px; border: 1px solid var(--line); border-radius: 14px;
        background: var(--panel); padding: 18px; display: flex; flex-direction: column; gap: 12px;
        cursor: pointer; position: relative; overflow: hidden;
      }
      #railcard.in { animation: cardIn .5s cubic-bezier(.2,.7,.2,1); }
      @keyframes cardIn {
        from { opacity: 0; transform: translateX(22px); }
        to { opacity: 1; transform: none; }
      }
      .rc-kind { font-family: var(--cond); font-size: 11px; letter-spacing: 1.5px; padding: 4px 10px; border-radius: 999px; align-self: flex-start; }
      .rc-kind.surge_underweight { background: rgba(255,106,61,.16); color: #ff9772; }
      .rc-kind.slump_overweight { background: rgba(52,160,224,.16); color: #6fc0ef; }
      .rc-kind.aligned { background: rgba(255,255,255,.08); color: var(--muted); }
      .rc-city { font-family: var(--cond); font-weight: 800; font-size: 30px; line-height: 1; letter-spacing: .3px; }
      .rc-city .rc-st { color: var(--muted); font-weight: 600; font-size: 18px; }
      .rc-demand { display: flex; align-items: baseline; gap: 12px; }
      .rc-demand .rc-big { font-family: var(--cond); font-weight: 800; font-size: 52px; line-height: .9; }
      .rc-demand.warm .rc-big { color: var(--warm); text-shadow: 0 0 22px rgba(255,106,61,.4); }
      .rc-demand.cool .rc-big { color: var(--cool); text-shadow: 0 0 22px rgba(52,160,224,.4); }
      .rc-demand .rc-sub { font-size: 12px; color: var(--muted); line-height: 1.3; }
      .rc-bars { display: flex; flex-direction: column; gap: 8px; margin-top: 2px; }
      .rc-barrow { display: grid; grid-template-columns: 64px 1fr 48px; align-items: center; gap: 8px; font-family: var(--cond); font-size: 11px; letter-spacing: 1px; color: var(--muted); }
      .rc-barrow b { color: #dce8f5; text-align: right; }
      .rc-bar { height: 9px; background: rgba(255,255,255,.07); border-radius: 5px; overflow: hidden; }
      .rc-bar i { display: block; height: 100%; background: rgba(255,255,255,.4); border-radius: 5px; transition: width .6s; }
      .rc-barrow.imp .rc-bar i { background: var(--accent); }
      .rc-move { font-family: var(--cond); font-weight: 800; font-size: 26px; letter-spacing: .5px; }
      .rc-move.pos { color: var(--pos); } .rc-move.neg { color: var(--neg); }
      .rc-owner { font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 10px; }
      #raildots { display: flex; gap: 6px; justify-content: center; padding: 12px 0 4px; }
      #raildots i { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.18); transition: all .2s; }
      #raildots i.on { background: var(--accent); width: 18px; border-radius: 4px; }
      .railfoot { display: flex; gap: 8px; padding-top: 6px; }
      .railfoot button { flex: 1; font-family: var(--cond); font-weight: 700; letter-spacing: .5px; font-size: 12px;
        border: 1.5px solid var(--line); background: rgba(255,255,255,.04); color: #cfe0f2; padding: 9px; border-radius: 9px; cursor: pointer; }
      .railfoot #openDrawer { background: var(--accent); color: #0a0f16; border-color: var(--accent); }

      /* ---------- controls (day strip) ---------- */
      #controls { display: flex; align-items: center; gap: 12px; padding: 10px 18px; border-top: 1px solid var(--line); background: rgba(0,0,0,.25); }
      #play { font-size: 14px; width: 40px; height: 40px; border-radius: 50%; border: none;
        background: var(--accent); color: #0a0f16; cursor: pointer; box-shadow: 0 0 16px color-mix(in oklch, var(--accent) 45%, transparent); flex: none; }
      #daystrip { display: flex; gap: 7px; flex: 1; min-width: 0; overflow-x: auto; }
      .daychip {
        flex: 1 1 0; min-width: 64px; cursor: pointer; border: 1.5px solid var(--line);
        background: rgba(255,255,255,.03); border-radius: 10px; padding: 7px 8px; text-align: center; transition: all .15s;
      }
      .daychip .dow { font-family: var(--cond); font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
      .daychip .dnum { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .daychip .dtemp { font-family: var(--cond); font-size: 12px; margin-top: 3px; color: #bcd; }
      .daychip.active { border-color: var(--accent); background: color-mix(in oklch, var(--accent) 20%, transparent); }
      .daychip.active .dnum { color: #dbe7f4; }

      /* ---------- ticker / chyron ---------- */
      #ticker {
        height: 42px; overflow: hidden; display: flex; align-items: center;
        background: linear-gradient(90deg, #0a121c, #0e1a28);
        border-top: 2px solid var(--accent); position: relative;
      }
      #ticker::before {
        content: "LIVE"; font-family: var(--cond); font-weight: 800; letter-spacing: 1px; font-size: 13px;
        color: #0a0f16; background: var(--accent); height: 100%; display: flex; align-items: center; padding: 0 14px;
        position: absolute; left: 0; top: 0; z-index: 2;
      }
      #tickertrack {
        display: inline-flex; align-items: center; white-space: nowrap; padding-left: 70px;
        will-change: transform; animation: marquee 60s linear infinite;
      }
      #ticker:hover #tickertrack { animation-play-state: paused; }
      @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      .tk { font-family: var(--cond); font-size: 14px; letter-spacing: .4px; color: #cfe0f2; padding: 0 4px; }
      .tk.lead { color: var(--accent); font-weight: 800; letter-spacing: 1px; }
      .tk.up b { color: #ffb59c; } .tk.dn b { color: #9cd2f2; }
      .tk .arr { font-size: 11px; }
      .tk.up .arr { color: var(--warm); } .tk.dn .arr { color: var(--cool); }
      .tk.sep { color: rgba(255,255,255,.2); padding: 0 14px; }

      footer { display: none; }

      /* ---------- drawer (deep detail) ---------- */
      #drawer {
        position: fixed; top: 0; right: 0; height: 100%; width: min(500px, 100%);
        background: var(--panel-solid); box-shadow: -16px 0 50px rgba(0,0,0,.5);
        transform: translateX(102%); transition: transform .3s cubic-bezier(.4,0,.2,1);
        display: flex; flex-direction: column; z-index: 40; border-left: 1px solid var(--line);
      }
      #drawer.open { transform: none; }
      .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); }
      .drawer-head h2 { margin: 0; font-family: var(--cond); font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }
      #drawerClose { border: none; background: none; font-size: 24px; cursor: pointer; color: var(--muted); }
      .drawer-body { overflow-y: auto; padding: 6px 20px 24px; }
      .panel { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin: 14px 0; background: rgba(255,255,255,.02); }
      .panel h3.ptitle { margin: 0 0 8px; font-family: var(--cond); font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }

      .brief h2 { font-family: var(--cond); font-size: 18px; margin: 6px 0 2px; }
      .brief h3 { font-family: var(--cond); font-size: 13px; margin: 14px 0 4px; color: var(--accent); text-transform: uppercase; letter-spacing: .6px; }
      .brief p { margin: 5px 0; font-size: 14px; line-height: 1.5; color: #d7e2ee; }
      .brief ul { margin: 5px 0; padding-left: 18px; font-size: 14px; color: #d7e2ee; }
      .brief hr { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
      .brief em { color: var(--muted); font-style: italic; font-size: 12px; }
      .brief strong { color: #fff; }

      .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      .actions button { font: inherit; font-weight: 600; font-size: 13px; padding: 9px 14px; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--line); background: rgba(255,255,255,.04); color: #dbe7f4; }
      #fire { background: var(--accent); color: #0a0f16; border-color: var(--accent); }
      #fire:disabled { opacity: .6; }
      #actionStatus { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 16px; }

      table.realloc { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 8px; }
      table.realloc th { text-align: left; color: var(--muted); font-weight: 600; padding: 4px 6px; border-bottom: 1px solid var(--line); }
      table.realloc td { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,.05); color: #d7e2ee; }
      table.realloc td.num { text-align: right; font-variant-numeric: tabular-nums; }
      .pos { color: var(--pos); font-weight: 600; } .neg { color: var(--neg); font-weight: 600; }
      .move { font-size: 14px; margin: 2px 0 4px; color: #eaf0f7; }
      .pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; letter-spacing: .3px; }
      .pill.in { background: rgba(255,106,61,.18); color: #ff9772; }
      .pill.out { background: rgba(52,160,224,.18); color: #6fc0ef; }
      .pill.flat { background: rgba(255,255,255,.08); color: var(--muted); }
      #scatter { width: 100%; height: auto; background: rgba(255,255,255,.03); border-radius: 8px; }
      .note { font-size: 11.5px; color: var(--muted); line-height: 1.45; margin-top: 8px; }

      #boot { position: fixed; inset: 0; background: var(--bg0); z-index: 60; display: flex; align-items: center; justify-content: center; gap: 12px; color: var(--muted); font-family: var(--cond); letter-spacing: 1px; }
      #boot::before { content: "🌦️"; font-size: 26px; animation: pulse 1.2s infinite; }
      @keyframes pulse { 0%,100% { opacity: .35 } 50% { opacity: 1 } }

      @media (max-width: 880px) {
        #rail { display: none; }
        .maptitle { max-width: 80%; }
      }
    </style>
  </head>
  <body>
    <div id="boot">PRECIPITATING DEMAND FORECAST…</div>

    <div id="app">
      <header id="topbar">
        <div class="netbug">
          <span class="mark">BELL<span class="dot">●</span>WETHER</span>
          <span class="strap">Demand Forecast Network</span>
        </div>
        <nav id="tabs"></nav>
        <div class="topright">
          <label class="cb"><input type="checkbox" id="cbToggle" /> CB</label>
          <span class="badge" id="source-badge">…</span>
          <span id="clock">—</span>
          <button class="iconbtn" id="fsBtn" title="Fullscreen">⤢</button>
        </div>
      </header>

      <div id="stagewrap">
        <div id="stage">
          <svg id="map" preserveAspectRatio="xMidYMid slice" viewBox="0 0 960 600"></svg>
          <div class="maptitle" id="title"></div>
          <div class="legend"><span>COOL</span><span class="grad"></span><span>HOT</span></div>
          <div id="alert"></div>
        </div>

        <aside id="rail">
          <div class="railhead">BIGGEST MOVES · <b id="railcat">—</b></div>
          <div id="railcard"></div>
          <div id="raildots"></div>
          <div class="railfoot">
            <button id="openDrawer">FULL BRIEF ↗</button>
            <button id="fireRail">⚡ FIRE ALERT</button>
          </div>
        </aside>
      </div>

      <div id="controls">
        <button id="play" title="Play the week">▶</button>
        <div id="daystrip"></div>
      </div>

      <div id="ticker"><span id="tickertrack"></span></div>
    </div>

    <footer></footer>

    <aside id="drawer">
      <div class="drawer-head">
        <h2>Diagnosis · Action</h2>
        <button id="drawerClose" title="Close">×</button>
      </div>
      <div class="drawer-body">
        <div class="panel">
          <h3 class="ptitle">The reallocation</h3>
          <div id="realloc"></div>
        </div>
        <div class="panel">
          <h3 class="ptitle">Take the action</h3>
          <div class="actions">
            <button id="fire">⚡ Fire alert to buyer</button>
            <button id="copy">Copy brief</button>
            <button id="download">Download .md</button>
          </div>
          <div id="actionStatus"></div>
        </div>
        <div class="panel">
          <h3 class="ptitle">Evidence · why we believe the projection</h3>
          <svg id="scatter" viewBox="0 0 360 240"></svg>
          <div class="note" id="evidenceNote"></div>
        </div>
        <div class="panel brief">
          <h3 class="ptitle">Strategist brief</h3>
          <div id="briefBody"></div>
        </div>
      </div>
    </aside>

    <script type="module" src="./src/main.js?v=2"></script>
  </body>
</html>
